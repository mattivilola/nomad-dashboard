name: NomadDashboard
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Debug
packages:
  NomadCore:
    path: Packages/NomadCore
  NomadUI:
    path: Packages/NomadUI
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.6.4
settings:
  base:
    PRODUCT_NAME: Nomad Dashboard
    PRODUCT_BUNDLE_IDENTIFIER: com.iloapps.NomadDashboard
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    SPARKLE_FEED_URL: ""
    SPARKLE_PUBLIC_ED_KEY: ""
targets:
  NomadDashboard:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - App/Sources
      - App/Resources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Nomad Dashboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.travel
        LSUIElement: true
        NSLocationUsageDescription: Nomad Dashboard uses your location to show local weather and travel context.
        NSLocationWhenInUseUsageDescription: Nomad Dashboard uses your location to show local weather and travel context.
        SUEnableAutomaticChecks: true
        SUFeedURL: $(SPARKLE_FEED_URL)
        SUPublicEDKey: $(SPARKLE_PUBLIC_ED_KEY)
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: App/NomadDashboard.entitlements
    dependencies:
      - package: NomadCore
      - package: NomadUI
      - package: Sparkle
        product: Sparkle
schemes:
  NomadDashboard:
    build:
      targets:
        NomadDashboard: all
    run:
      config: Debug
    archive:
      config: Release
