name: Bug report
description: Report a defect or regression in Nomad Dashboard
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Describe the observed problem and the expected behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Include the shortest reliable path to the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: macOS version, hardware, and network context if relevant.

