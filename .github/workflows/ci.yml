name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain helpers
        run: brew bundle --file Brewfile --no-upgrade

      - name: Lint Swift sources
        run: ./scripts/lint.sh

      - name: Test Swift packages
        run: ./scripts/test.sh

      - name: Generate Xcode project
        run: ./scripts/generate-project.sh

      - name: Build app
        run: ./scripts/build-dev.sh
